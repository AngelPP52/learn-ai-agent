<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Guardrails layers</title>
  <desc id="desc">Layered guardrails around input, decision, tool execution, and output.</desc>
  <rect width="960" height="420" fill="#f7f7f2"/>
  <rect x="86" y="78" width="154" height="78" rx="8" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <text x="163" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#111827">Input</text>
  <text x="163" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">classify risk</text>
  <rect x="314" y="78" width="154" height="78" rx="8" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <text x="391" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#111827">Decision</text>
  <text x="391" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">policy checks</text>
  <rect x="542" y="78" width="154" height="78" rx="8" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <text x="619" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#111827">Tool call</text>
  <text x="619" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">validate action</text>
  <rect x="770" y="78" width="154" height="78" rx="8" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <text x="847" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#111827">Output</text>
  <text x="847" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">final review</text>
  <path d="M240 117 L314 117" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M468 117 L542 117" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M696 117 L770 117" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="166" y="246" width="220" height="64" rx="8" fill="#e5e7eb" stroke="#6b7280"/>
  <text x="276" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">Human intervention</text>
  <rect x="574" y="246" width="220" height="64" rx="8" fill="#e5e7eb" stroke="#6b7280"/>
  <text x="684" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">Logging and evals</text>
  <path d="M391 156 L276 246" stroke="#6b7280" stroke-width="2" fill="none"/>
  <path d="M619 156 L684 246" stroke="#6b7280" stroke-width="2" fill="none"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
