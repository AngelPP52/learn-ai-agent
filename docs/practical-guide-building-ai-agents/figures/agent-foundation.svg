<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Agent foundation</title>
  <desc id="desc">An agent foundation made of model, tools, instructions, orchestration, and guardrails.</desc>
  <rect width="960" height="420" fill="#f7f7f2"/>
  <rect x="350" y="36" width="260" height="78" rx="10" fill="#111827"/>
  <text x="480" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">Agent</text>
  <text x="480" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#d1d5db">reason, decide, act</text>
  <rect x="82" y="176" width="200" height="92" rx="8" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <text x="182" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#111827">Model</text>
  <text x="182" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">decision engine</text>
  <rect x="380" y="176" width="200" height="92" rx="8" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <text x="480" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#111827">Tools</text>
  <text x="480" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">external actions</text>
  <rect x="678" y="176" width="200" height="92" rx="8" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <text x="778" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#111827">Instructions</text>
  <text x="778" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">rules and goals</text>
  <rect x="226" y="326" width="220" height="54" rx="8" fill="#e5e7eb" stroke="#6b7280"/>
  <text x="336" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">Orchestration</text>
  <rect x="514" y="326" width="220" height="54" rx="8" fill="#e5e7eb" stroke="#6b7280"/>
  <text x="624" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">Guardrails</text>
  <path d="M480 114 L182 176" stroke="#6b7280" stroke-width="2" fill="none"/>
  <path d="M480 114 L480 176" stroke="#6b7280" stroke-width="2" fill="none"/>
  <path d="M480 114 L778 176" stroke="#6b7280" stroke-width="2" fill="none"/>
  <path d="M380 268 L336 326" stroke="#6b7280" stroke-width="2" fill="none"/>
  <path d="M580 268 L624 326" stroke="#6b7280" stroke-width="2" fill="none"/>
</svg>
